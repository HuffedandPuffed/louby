<div class="scratchpad-container">
  <h3>Digital Scratchpad</h3>
  <!-- Input box -->
  <input type="text" id="scratchInput" placeholder="Add a record..." />
  <button onclick="addRecord()">Add</button>

  <!-- Container for stored records underneath -->
  <ul id="recordsList" style="list-style: none; padding: 0; margin-top: 15px;"></ul>
</div>

<script>
  // Add a record to the list
  function addRecord() {
    const input = document.getElementById('scratchInput');
    const val = input.value.trim();
    if (!val) return;

    createRecordElement(val);
    saveRecords();
    input.value = '';
  }

  // Create list item with delete button
  function createRecordElement(text) {
    const list = document.getElementById('recordsList');
    const li = document.createElement('li');
    li.style.margin = '8px 0';
    li.style.display = 'flex';
    li.style.justifyContent = 'space-between';
    
    li.innerHTML = `
      <span>${text}</span>
      <button onclick="removeRecord(this)" style="margin-left: 10px; cursor: pointer;">Delete</button>
    `;
    list.appendChild(li);
  }

  // Remove individual record
  function removeRecord(btn) {
    btn.parentElement.remove();
    saveRecords();
  }

  // Store in browser memory
  function saveRecords() {
    const records = [];
    document.querySelectorAll('#recordsList span').forEach(el => records.push(el.textContent));
    localStorage.setItem('scratchpadData', JSON.stringify(records));
  }

  // Reload records on page load
  window.onload = function() {
    const saved = JSON.parse(localStorage.getItem('scratchpadData') || '[]');
    saved.forEach(text => createRecordElement(text));
  };
</script>
